name: Publish Google Sheets Demo Image

run-name: Publish Google Sheets demo image for ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: google-sheets-demo

jobs:
  publish-google-sheets-demo-image:
    name: Build And Push Google Sheets Demo Image
    runs-on: ubuntu-latest
    env:
      GOOGLE_SHEETS_CLIENT_ID: ${{ secrets.GOOGLE_SHEETS_CLIENT_ID }}
      GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
      GOOGLE_SHEETS_CLOUD_PROJECT_NUMBER: ${{ secrets.GOOGLE_SHEETS_CLOUD_PROJECT_NUMBER }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set Up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.3"
          cache: pip

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[app,dev]'

      - name: Run Repository Check
        run: make check

      - name: Verify App Build Secrets
        shell: bash
        run: |
          missing=()
          for name in \
            GOOGLE_SHEETS_CLIENT_ID \
            GOOGLE_SHEETS_API_KEY \
            GOOGLE_SHEETS_CLOUD_PROJECT_NUMBER
          do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required repository secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log In To GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract App Image Metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build And Push Google Sheets Demo Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: apps/google_sheets/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=google-sheets-image
          cache-to: type=gha,mode=max,scope=google-sheets-image
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GOOGLE_SHEETS_CLIENT_ID=${{ env.GOOGLE_SHEETS_CLIENT_ID }}
            GOOGLE_SHEETS_API_KEY=${{ env.GOOGLE_SHEETS_API_KEY }}
            GOOGLE_SHEETS_CLOUD_PROJECT_NUMBER=${{ env.GOOGLE_SHEETS_CLOUD_PROJECT_NUMBER }}
