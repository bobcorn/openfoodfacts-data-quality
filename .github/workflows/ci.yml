name: Validate Project

run-name: Validate project (${{ github.head_ref || github.ref_name }})

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Run Validation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set Up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.3"
          cache: pip

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[app,dev]' twine

      - name: Run Repository Check
        run: make check

      - name: Build Source And Wheel Distributions
        run: make build

      - name: Verify Distribution Metadata
        run: python -m twine check --strict dist/*

      - name: Smoke Test Built Wheel
        shell: bash
        run: |
          python -m venv .artifact-smoke
          source .artifact-smoke/bin/activate
          pip install dist/*.whl
          python scripts/verify_built_distribution.py
