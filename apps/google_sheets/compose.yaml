name: google-sheets

services:
  app:
    image: google-sheets-demo:local
    build:
      context: ../..
      dockerfile: apps/google_sheets/Dockerfile
      args:
        GOOGLE_SHEETS_CLIENT_ID: ${GOOGLE_SHEETS_CLIENT_ID:-}
        GOOGLE_SHEETS_API_KEY: ${GOOGLE_SHEETS_API_KEY:-}
        GOOGLE_SHEETS_CLOUD_PROJECT_NUMBER: ${GOOGLE_SHEETS_CLOUD_PROJECT_NUMBER:-}
    init: true
    ports:
      - "${GOOGLE_SHEETS_BIND_HOST:-127.0.0.1}:${GOOGLE_SHEETS_PORT:-8501}:${GOOGLE_SHEETS_PORT:-8501}"
    environment:
      GOOGLE_SHEETS_PORT: "${GOOGLE_SHEETS_PORT:-8501}"
