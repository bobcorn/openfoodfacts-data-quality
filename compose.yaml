name: openfoodfacts-data-quality

services:
  run_app:
    image: openfoodfacts-data-quality:local
    build:
      context: .
      target: runtime
    init: true
    ports:
      - "${PORT:-8000}:8000"
    environment:
      SOURCE_SNAPSHOT_PATH: /work/source-snapshot
      BATCH_SIZE: "${BATCH_SIZE:-5000}"
      BATCH_WORKERS: "${BATCH_WORKERS:-}"
      LEGACY_BACKEND_WORKERS: "${LEGACY_BACKEND_WORKERS:-4}"
      REFERENCE_RESULT_CACHE_DIR: /cache
      MISMATCH_EXAMPLES_LIMIT: "${MISMATCH_EXAMPLES_LIMIT:-20}"
      CHECK_PROFILE: "${CHECK_PROFILE:-full}"
      SOURCE_DATASET_PROFILE: "${SOURCE_DATASET_PROFILE:-full}"
      PARITY_STORE_PATH: "${PARITY_STORE_PATH:-}"
      MIGRATION_INVENTORY_PATH: "${MIGRATION_INVENTORY_PATH:-}"
      MIGRATION_ESTIMATION_SHEET_PATH: "${MIGRATION_ESTIMATION_SHEET_PATH:-}"
    volumes:
      - type: bind
        source: ${SOURCE_SNAPSHOT_PATH:?Set SOURCE_SNAPSHOT_PATH in .env}
        target: /work/source-snapshot
        read_only: true
      - type: bind
        source: ./data
        target: /opt/openfoodfacts-data-quality/data
      - type: bind
        source: ./artifacts
        target: /opt/openfoodfacts-data-quality/artifacts
      - type: bind
        source: ./config
        target: /opt/openfoodfacts-data-quality/config
        read_only: true
      - reference_result_cache:/cache

volumes:
  reference_result_cache:
