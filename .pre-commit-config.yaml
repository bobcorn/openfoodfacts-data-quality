default_install_hook_types:
  - pre-commit

minimum_pre_commit_version: "4.0.0"

repos:
  - repo: local
    hooks:
      - id: sync-example-notebooks
        name: sync and execute example notebooks
        entry: python scripts/sync_example_notebooks.py
        language: system
        files: ^examples/(notebooks|scripts)/(basic_usage|input_formats|jurisdiction_filtering)\.(ipynb|py)$
        pass_filenames: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
