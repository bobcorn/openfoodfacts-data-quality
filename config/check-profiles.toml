default_profile = "full"

[profiles.full]
description = "Runs every legacy-backed check available for strict parity."
mode = "all"
check_input_surface = "enriched_products"
parity_baselines = ["legacy"]

[profiles.raw_products]
description = "Runs legacy-backed checks supported by the current Open Food Facts public database schema."
mode = "all"
check_input_surface = "raw_products"
parity_baselines = ["legacy"]

[profiles.focused]
description = "Runs the current migration workset. Edit check_ids as migration focus changes."
mode = "include"
check_input_surface = "enriched_products"
parity_baselines = ["legacy"]
check_ids = [
  "en:serving-quantity-over-product-quantity",
]
