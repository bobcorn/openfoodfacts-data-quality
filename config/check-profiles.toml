default_profile = "full"

[profiles.full]
description = "Runs every shipped check."
mode = "all"
check_context_provider = "enriched_snapshots"
parity_baselines = ["legacy", "none"]

[profiles.legacy]
description = "Runs shipped checks that still compare against legacy behavior."
mode = "all"
check_context_provider = "enriched_snapshots"
parity_baselines = ["legacy"]

[profiles.focused]
description = "Runs the current migration workset. Edit check_ids as focus changes."
mode = "include"
check_context_provider = "enriched_snapshots"
parity_baselines = ["legacy", "none"]
check_ids = [
  "en:serving-quantity-over-product-quantity",
]
